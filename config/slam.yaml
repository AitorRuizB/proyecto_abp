/**:
  ros__parameters:
    use_sim_time: True
    mode: "mapping"
    
    # Parámetros vitales de mapeo (Fijos para todos los robots)
    resolution: 0.05
    max_laser_range: 10.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 1.0
    enable_interactive_mode: True
    position_search_distance: 10.0
    position_search_angle: 0.35